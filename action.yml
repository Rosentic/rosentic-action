name: 'Rosentic - Cross-Branch Compatibility Check'
description: 'Catches when changes across branches break each other before merge. CI checks branches alone. Rosentic checks them together.'
author: 'Rosentic'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  scan-mode:
    description: 'Scan mode: pr (check PR branch against all others), full (check all branch pairs), or siblings (check specific branches against each other)'
    required: false
    default: 'pr'
  branches:
    description: 'Comma-separated branch names for siblings mode. Required when scan-mode is siblings.'
    required: false
    default: ''
  format:
    description: 'Output format: markdown, text, or json'
    required: false
    default: 'markdown'
  stale-days:
    description: 'Skip branches with no commits in the last N days. Set to 0 to scan all branches.'
    required: false
    default: '30'
  mode:
    description: 'audit (default) posts the report but always passes. enforce blocks merge on conflicts.'
    required: false
    default: 'audit'
  api-key:
    description: 'Rosentic API key for dashboard telemetry. Get one at https://api.rosentic.com/settings'
    required: false
    default: ''
  active-only:
    description: 'Only scan branches with open PRs (live siblings). Keeps signal from drowning in abandoned-branch noise. Set to false for full repo-wide debt sweeps.'
    required: false
    default: 'true'

runs:
  using: 'docker'
  # Pinned to an immutable digest (was :latest). Bump this on each engine release.
  image: 'docker://ghcr.io/rosentic/rosentic-engine@sha256:2eb1f691a1af62037e9cae7b2856b51200b062f3764d3e7a9d91cf8faa876644'
  env:
    SCAN_MODE: ${{ inputs.scan-mode }}
    ROSENTIC_BRANCHES: ${{ inputs.branches }}
    FORMAT: ${{ inputs.format }}
    STALE_DAYS: ${{ inputs.stale-days }}
    ROSENTIC_MODE: ${{ inputs.mode }}
    ROSENTIC_API_KEY: ${{ inputs.api-key }}
    ACTIVE_ONLY: ${{ inputs.active-only }}
